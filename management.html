<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>codex2api 管理台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4f1;
      --surface: #ffffff;
      --surface-soft: #fbfaf8;
      --surface-warm: #f0e8df;
      --line: #ded8cf;
      --line-strong: #cfc6ba;
      --text: #24211f;
      --muted: #746d66;
      --accent: #b86532;
      --accent-strong: #9c4f25;
      --green: #21765c;
      --green-soft: #e5f4ed;
      --red: #9a3636;
      --red-soft: #f7e5e2;
      --blue: #315e8b;
      --blue-soft: #e8f0f8;
      --amber: #8a6218;
      --amber-soft: #f5ecd7;
      --shadow: 0 10px 28px rgba(65, 55, 46, 0.07);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      letter-spacing: 0;
    }

    [hidden] { display: none !important; }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      min-height: 34px;
      padding: 0 14px;
      line-height: 1;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.16s ease, background-color 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover { border-color: var(--line-strong); background: var(--surface-soft); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      min-height: 36px;
      padding: 7px 10px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 101, 50, 0.14);
    }

    .app {
      display: grid;
      grid-template-columns: 252px minmax(0, 1fr);
      min-height: 100vh;
    }

    .login-view {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(184, 101, 50, 0.18), transparent 34%),
        linear-gradient(135deg, #f8f5f0 0%, #efe7dc 100%);
    }

    .login-card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 24px 70px rgba(65, 55, 46, 0.16);
      padding: 24px;
      backdrop-filter: blur(16px);
    }

    .login-card .brand { margin-bottom: 20px; }

    .login-title {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .login-subtitle {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .login-fields {
      display: grid;
      gap: 13px;
    }

    .login-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
    }

    .login-actions button { min-width: 110px; }

    .login-notice {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
    }

    .login-notice.show { display: block; }
    .login-notice.error { color: var(--red); border-color: #e5c4bd; background: var(--red-soft); }
    .login-notice.success { color: var(--green); border-color: #b9decf; background: var(--green-soft); }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 46px;
      margin-bottom: 24px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      background: var(--surface-warm);
      color: var(--accent-strong);
      font-weight: 800;
    }

    .brand-title {
      font-size: 17px;
      font-weight: 760;
      line-height: 1.2;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .nav-group {
      display: grid;
      gap: 8px;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      text-align: left;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .nav-button:hover { background: var(--surface-soft); color: var(--text); }
    .nav-button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      font-weight: 800;
    }

    .main {
      min-width: 0;
      padding: 26px 30px 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 20px;
      align-items: start;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.2;
    }

    .page-kicker {
      color: var(--muted);
      margin-top: 5px;
    }

    .connection {
      display: grid;
      grid-template-columns: 220px auto auto auto;
      align-items: end;
      gap: 10px;
      justify-content: end;
    }

    .field-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .field-help {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      color: var(--muted);
      white-space: nowrap;
    }

    .remember input { width: 16px; height: 16px; min-height: 0; padding: 0; }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
    .danger { color: var(--red); border-color: #e5c4bd; background: #fff9f8; }
    .danger:hover { border-color: #d59c91; }
    .ghost { background: transparent; }

    .notice {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
    }

    .notice.show { display: flex; }
    .notice.error { color: var(--red); border-color: #e5c4bd; background: var(--red-soft); }
    .notice.success { color: var(--green); border-color: #b9decf; background: var(--green-soft); }

    .inline-alert {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid #dfc98c;
      border-radius: var(--radius);
      background: var(--amber-soft);
      color: var(--amber);
    }

    .inline-alert.show { display: block; }

    .view { display: none; }
    .view.active { display: block; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 106px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .metric-note {
      color: var(--muted);
      margin-top: 8px;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 740;
    }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      line-height: 1;
      white-space: nowrap;
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chip-count {
      display: inline-grid;
      place-items: center;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.08);
      padding: 0 6px;
      font-size: 11px;
    }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
    }

    .channel-table {
      min-width: 0;
      table-layout: fixed;
    }

    .channel-table th:nth-child(1), .channel-table td:nth-child(1) { width: 21%; }
    .channel-table th:nth-child(2), .channel-table td:nth-child(2) { width: 23%; }
    .channel-table th:nth-child(3), .channel-table td:nth-child(3) { width: 66px; }
    .channel-table th:nth-child(4), .channel-table td:nth-child(4) { width: 70px; }
    .channel-table th:nth-child(5), .channel-table td:nth-child(5) { width: 92px; }
    .channel-table th:nth-child(6), .channel-table td:nth-child(6) { width: 86px; }
    .channel-table th:nth-child(7), .channel-table td:nth-child(7) { width: 120px; }
    .channel-table th:nth-child(8), .channel-table td:nth-child(8) { width: 98px; }
    .channel-table th:nth-child(9), .channel-table td:nth-child(9) { width: 58px; }
    .channel-table th:nth-child(10), .channel-table td:nth-child(10) { width: 88px; }
    .channel-table th:nth-child(11), .channel-table td:nth-child(11) { width: 194px; }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid #eee9e3;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f1ece5;
      color: #5c554f;
      font-weight: 680;
      white-space: nowrap;
      font-size: 13px;
    }

    tbody tr:hover { background: var(--surface-soft); }
    tbody tr:last-child td { border-bottom: 0; }

    .truncate {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }

    .compact-id {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 1px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
    }

    .ok { color: var(--green); background: var(--green-soft); }
    .warn { color: var(--amber); background: var(--amber-soft); }
    .bad { color: var(--red); background: var(--red-soft); }
    .info { color: var(--blue); background: var(--blue-soft); }
    .idle { color: var(--muted); background: #efebe6; }

    .toggle {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      width: 42px;
      height: 24px;
      min-height: 0;
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 3px;
      gap: 0;
      background: #d6d0c8;
      border: 0;
      vertical-align: middle;
    }

    .toggle::after {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      transition: transform 0.16s ease;
    }

    .toggle:hover { background: #cbc4ba; }
    .toggle.on { background: var(--accent); }
    .toggle.on:hover { background: var(--accent-strong); }
    .toggle.on::after { transform: translateX(18px); }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      justify-content: flex-start;
      white-space: nowrap;
    }

    .row-actions button {
      min-width: 0;
      padding: 0 10px;
      min-height: 30px;
      font-size: 13px;
    }

    .test-result {
      display: none;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface-soft);
    }

    .test-result.show { display: block; }
    .test-result.success { border-color: #b9decf; background: var(--green-soft); color: var(--green); }
    .test-result.error { border-color: #e5c4bd; background: var(--red-soft); color: var(--red); }

    .test-result-title {
      font-weight: 740;
      margin-bottom: 8px;
    }

    .test-result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      color: var(--text);
    }

    .test-result-message {
      grid-column: 1 / -1;
      overflow-wrap: anywhere;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid #eee9e3;
      min-width: 0;
    }

    .detail-item:nth-child(odd) { border-right: 1px solid #eee9e3; }
    .detail-label { color: var(--muted); }
    .detail-value { overflow-wrap: anywhere; }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .model-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      background: var(--surface-soft);
    }

    .model-id {
      font-weight: 740;
      overflow-wrap: anywhere;
    }

    .model-meta {
      color: var(--muted);
      margin-top: 8px;
      font-size: 12px;
    }

    .empty {
      padding: 26px 14px;
      color: var(--muted);
      text-align: center;
    }

    dialog {
      width: min(640px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: 0 24px 80px rgba(43, 34, 27, 0.24);
    }

    dialog::backdrop { background: rgba(38, 32, 27, 0.32); }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-title { font-size: 17px; font-weight: 760; }
    .dialog-body { padding: 16px; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .form-grid .wide { grid-column: 1 / -1; }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      color: var(--muted);
    }

    .checkbox-line input { width: 16px; height: 16px; min-height: 0; }

    .model-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      padding: 6px 0;
    }

    .model-checks label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
    }

    .model-checks input { width: 15px; height: 15px; min-height: 0; }

    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1120px) {
      .topbar { grid-template-columns: 1fr; }
      .connection { justify-content: stretch; grid-template-columns: 1fr auto auto auto; }
      .summary-grid { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-item:nth-child(odd) { border-right: 0; }
    }

    @media (max-width: 820px) {
      .app { display: block; }
      .sidebar {
        position: static;
        height: auto;
        padding: 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .brand { margin-bottom: 12px; }
      .nav-group { display: flex; overflow-x: auto; padding-bottom: 2px; }
      .nav-button { min-width: 126px; grid-template-columns: 22px 1fr; }
      .nav-button .nav-count { display: none; }
      .main { padding: 18px 14px 28px; }
      .connection { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .filter-row { justify-content: flex-start; }
      .summary-grid { grid-template-columns: 1fr; }
      .panel-header { align-items: flex-start; flex-direction: column; }
      .panel-actions { justify-content: flex-start; }
      .detail-item { grid-template-columns: 1fr; gap: 4px; }
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <section class="login-view" id="loginView">
    <form class="login-card" id="loginForm">
      <div class="brand" aria-label="codex2api">
        <div class="brand-mark">C2</div>
        <div>
          <div class="brand-title">codex2api</div>
          <div class="brand-subtitle">Gateway Management</div>
        </div>
      </div>
      <h1 class="login-title">管理台登录</h1>
      <div class="login-subtitle">输入 Admin Token 后才会加载管理信息。</div>
      <div class="login-fields">
        <label>
          <span class="field-label">API Base URL</span>
          <input id="loginApiBase" autocomplete="off" spellcheck="false">
        </label>
        <label>
          <span class="field-label">Admin Token</span>
          <input id="loginAdminToken" type="password" autocomplete="off" spellcheck="false" required>
        </label>
      </div>
      <div class="login-actions">
        <label class="remember">
          <input id="loginRememberToken" type="checkbox">
          <span>本机保存</span>
        </label>
        <button id="loginButton" type="submit" class="primary">登录</button>
      </div>
      <div class="login-notice" id="loginNotice" role="status"></div>
    </form>
  </section>

  <div class="app" id="appShell" hidden>
    <aside class="sidebar">
      <div class="brand" aria-label="codex2api">
        <div class="brand-mark">C2</div>
        <div>
          <div class="brand-title">codex2api</div>
          <div class="brand-subtitle">Gateway Management</div>
        </div>
      </div>
      <nav class="nav-group" aria-label="主导航">
        <button class="nav-button active" type="button" data-view="overview">
          <span class="nav-icon">□</span><span>概览</span><span class="nav-count" id="navOverviewCount">-</span>
        </button>
        <button class="nav-button" type="button" data-view="channels">
          <span class="nav-icon">≡</span><span>渠道</span><span class="nav-count" id="navChannelCount">-</span>
        </button>
        <button class="nav-button" type="button" data-view="models">
          <span class="nav-icon">AI</span><span>模型</span><span class="nav-count" id="navModelCount">-</span>
        </button>
        <button class="nav-button" type="button" data-view="state">
          <span class="nav-icon">⌁</span><span>网关状态</span><span class="nav-count" id="navStateCount">-</span>
        </button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">概览</h1>
          <div class="page-kicker" id="pageKicker">Codex Responses 网关运行状态</div>
        </div>
        <div class="connection">
          <label>
            <span class="field-label">API Base URL</span>
            <input id="apiBase" autocomplete="off" spellcheck="false">
          </label>
          <button id="applyConnection" type="button" class="primary">连接</button>

  <script>
    (() => {
      const storageKeys = {
        apiBase: "codex2api.management.apiBase",
        adminToken: "codex2api.management.adminToken"
      };

      const titles = {
        overview: ["概览", "Codex Responses 网关运行状态"],
        channels: ["渠道", "管理上游渠道、优先级、密钥与运行状态"],
        models: ["模型", "当前网关暴露的 OpenAI 兼容模型"],
        state: ["网关状态", "客户端指纹、会话与服务配置"]
      };

      const state = {
        apiBase: initialBaseUrl(),
        adminToken: localStorage.getItem(storageKeys.adminToken) || "",
        rememberToken: Boolean(localStorage.getItem(storageKeys.adminToken)),
        authenticated: false,
        activeView: "overview",
        health: null,
        config: null,
        models: [],
        channels: [],
        query: "",
        filter: "all",
        editingId: null,
        testingId: null,
        testResult: null,
        busy: false
      };

      const busyActions = new Set([
        "toggle-channel",
        "reset-runtime",
        "delete-channel",
        "reset-fingerprint",
        "refresh-models"
      ]);

      const dom = {};

      document.addEventListener("DOMContentLoaded", init);

      function initialBaseUrl() {
        const saved = localStorage.getItem(storageKeys.apiBase);
        if (saved) return saved;
        if (location.protocol === "http:" || location.protocol === "https:") return location.origin;
        return "http://localhost:8000";
      }

      function isSameOriginApiBase(apiBase = state.apiBase) {
        if (location.protocol !== "http:" && location.protocol !== "https:") return false;
        try {
          return new URL(apiBase, location.href).origin === location.origin;
        } catch (_) {
          return false;
        }
      }

      function init() {
        cacheDom();
        dom.loginApiBase.value = state.apiBase;
        dom.loginAdminToken.value = state.adminToken;
        dom.loginRememberToken.checked = state.rememberToken;
        dom.apiBase.value = state.apiBase;
        bindEvents();
        render();
        restoreSavedSession();
      }

      function cacheDom() {
        for (const id of [
          "loginView", "appShell", "loginForm", "loginApiBase", "loginAdminToken", "loginRememberToken",
          "loginButton", "loginNotice", "apiBase", "applyConnection", "refreshAll", "logoutButton", "notice",
          "pageTitle", "pageKicker", "summaryGrid", "overviewRows", "channelSearch", "channelFilters",
          "channelKeyAlert", "channelRows", "modelGrid", "stateDetails", "navOverviewCount", "navChannelCount",
          "navModelCount", "navStateCount", "channelDialog", "channelForm", "dialogTitle", "channelName",
          "channelUrl", "channelPriority", "channelEnabled", "channelUpstreamKey", "clearChannelUpstreamKey",
          "clearUpstreamKeyWrap", "channelDownstreamKey", "clearChannelKey", "clearKeyWrap", "channelProxyUrl", "channelModelChecks", "saveChannel",
          "testDialog", "testForm", "testDialogTitle", "testChannelName", "testModel", "testResult", "runChannelTest"
        ]) {
          dom[id] = document.getElementById(id);
        }
      }

      function bindEvents() {
        document.querySelectorAll("[data-view]").forEach((button) => {
          button.addEventListener("click", () => setView(button.dataset.view));
        });

        document.addEventListener("click", (event) => {
          const actionButton = event.target.closest("[data-action]");
          if (actionButton) handleAction(actionButton.dataset.action, actionButton.dataset.id);

          const jumpButton = event.target.closest("[data-jump]");
          if (jumpButton) setView(jumpButton.dataset.jump);

          const filterButton = event.target.closest("[data-filter]");
          if (filterButton) {
            state.filter = filterButton.dataset.filter;
            renderChannels();
          }
        });

        dom.loginForm.addEventListener("submit", login);
        dom.applyConnection.addEventListener("click", applyConnection);
        dom.refreshAll.addEventListener("click", refreshAll);
        dom.logoutButton.addEventListener("click", logout);
        dom.channelSearch.addEventListener("input", () => {
          state.query = dom.channelSearch.value.trim().toLowerCase();
          renderChannels();
        });
        dom.channelForm.addEventListener("submit", saveChannel);
        dom.testForm.addEventListener("submit", runChannelTest);
      }

      function setView(view) {
        state.activeView = view;
        document.querySelectorAll(".view").forEach((section) => section.classList.remove("active"));
        document.getElementById(`view-${view}`).classList.add("active");
        document.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === view);
        });
        const [title, kicker] = titles[view] || titles.overview;
        dom.pageTitle.textContent = title;
        dom.pageKicker.textContent = kicker;
      }

      function applyConnection() {
        if (state.busy) return;
        state.apiBase = dom.apiBase.value.trim().replace(/\/+$/, "") || initialBaseUrl();
        localStorage.setItem(storageKeys.apiBase, state.apiBase);
        refreshAll();
      }

      async function restoreSavedSession() {
        if (!state.adminToken) return;
        if (!isSameOriginApiBase()) {
          showLoginNotice("已保存跨域 API Base。为避免泄露 Admin Token，请手动登录", "");
          return;
        }
        setLoginBusy(true);
        showLoginNotice("正在恢复已保存登录", "");
        try {
          await request("/admin/session", { admin: true, skipAuthRedirect: true });
          state.authenticated = true;
          state.rememberToken = true;
          dom.loginRememberToken.checked = true;
          dom.apiBase.value = state.apiBase;
          dom.loginView.hidden = true;
          dom.appShell.hidden = false;
          await refreshAll({ force: true });
        } catch (error) {
          state.authenticated = false;
          if (error.status === 401) {
            state.adminToken = "";
            localStorage.removeItem(storageKeys.adminToken);
            dom.loginAdminToken.value = "";
            showLoginNotice("已保存的 Admin Token 无效，请重新登录", "error");
          } else {
            showLoginNotice(`自动登录失败：${error.message}`, "error");
          }
        } finally {
          setLoginBusy(false);
        }
      }

      async function login(event) {
        event.preventDefault();
        if (dom.loginButton.disabled) return;
        state.apiBase = dom.loginApiBase.value.trim().replace(/\/+$/, "") || initialBaseUrl();
        state.adminToken = dom.loginAdminToken.value.trim();
        state.rememberToken = dom.loginRememberToken.checked;
        if (!state.adminToken) {
          showLoginNotice("请输入 Admin Token", "error");
          return;
        }

        setLoginBusy(true);
        showLoginNotice("正在验证", "");
        try {
          localStorage.setItem(storageKeys.apiBase, state.apiBase);
          localStorage.removeItem(storageKeys.adminToken);
          await request("/admin/session", { admin: true, skipAuthRedirect: true });
          state.authenticated = true;
          persistConnection();
          dom.apiBase.value = state.apiBase;
          dom.loginView.hidden = true;
          dom.appShell.hidden = false;
          showLoginNotice("登录成功", "success");
          await refreshAll();
        } catch (error) {
          state.authenticated = false;
          showLoginNotice(error.message, "error");
        } finally {
          setLoginBusy(false);
        }
      }

      function logout() {
        state.authenticated = false;
        state.adminToken = "";
        state.health = null;
        state.config = null;
        state.models = [];
        state.channels = [];
        localStorage.removeItem(storageKeys.adminToken);
        dom.loginAdminToken.value = "";
        dom.loginApiBase.value = state.apiBase;
        dom.appShell.hidden = true;
        dom.loginView.hidden = false;
        render();
        showLoginNotice("已退出", "");
      }

      function persistConnection() {
        localStorage.setItem(storageKeys.apiBase, state.apiBase);
        if (state.rememberToken && state.adminToken) {
          localStorage.setItem(storageKeys.adminToken, state.adminToken);
        } else {
          localStorage.removeItem(storageKeys.adminToken);
        }
      }

      async function refreshAll(options = {}) {
        if (!state.authenticated) return;
        if (state.busy && !options.force) return;
        persistConnection();
        setBusy(true);
        showNotice("正在刷新", "");
        const errors = [];
        try {
          await Promise.all([
            loadPublic("/health", (data) => { state.health = data; }, errors, "health"),
            loadAdmin("/admin/config", (data) => { state.config = data; }, errors, "config"),
            loadPublic("/v1/models", (data) => { state.models = Array.isArray(data.data) ? data.data : []; }, errors, "models")
          ]);

          try {
            await loadChannels();
          } catch (error) {
            state.channels = [];
            errors.push(`admin: ${error.message}`);
          }

          render();
          if (errors.length) {
            showNotice(errors.join("；"), "error");
          } else {
            showNotice("已刷新", "success");
          }
        } finally {
          setBusy(false);
        }
      }

      async function loadPublic(path, assign, errors, label) {
        try {
          assign(await request(path));
        } catch (error) {
          errors.push(`${label}: ${error.message}`);
        }
      }

      async function loadAdmin(path, assign, errors, label) {
        try {
          assign(await request(path, { admin: true }));
        } catch (error) {
          if (label === "config") state.config = null;
          errors.push(`${label}: ${error.message}`);
        }
      }

      async function loadChannels() {
        const data = await request("/admin/channels", { admin: true });
        state.channels = Array.isArray(data.data) ? data.data : [];
      }

      async function request(path, options = {}) {
        const headers = {};
        if (options.body !== undefined) {
          headers["Content-Type"] = "application/json";
        }
        if (options.admin) {
          if (!state.adminToken) throw new Error("缺少 Admin Token");
          headers.Authorization = `Bearer ${state.adminToken}`;
        }

        const timeoutMs = options.timeoutMs ?? 30000;
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
        const init = { method: options.method || "GET", headers, signal: controller.signal, cache: "no-store" };
        if (options.body !== undefined) init.body = JSON.stringify(options.body);

        let response;
        let text = "";
        try {
          response = await fetch(`${state.apiBase}${path}`, init);
          text = await response.text();
        } catch (error) {
          if (error.name === "AbortError") throw new Error(`请求超时（${Math.round(timeoutMs / 1000)} 秒）`);
          throw new Error(`网络请求失败：${error.message || "无法连接后端"}`);
        } finally {
          window.clearTimeout(timeoutId);
        }
        let data = null;
        if (text) {
          try { data = JSON.parse(text); } catch (_) { data = text; }
        }
        if (!response.ok) {
          const message = data?.error?.message || data?.message || text || response.statusText;
          const error = new Error(message);
          error.status = response.status;
          error.data = data;
          if (response.status === 401 && options.admin && !options.skipAuthRedirect) {
            handleAuthExpired(message);
          }
          throw error;
        }
        return data;
      }

      function handleAuthExpired(message) {
        state.authenticated = false;
        state.adminToken = "";
        state.health = null;
        state.config = null;
        state.models = [];
        state.channels = [];
        localStorage.removeItem(storageKeys.adminToken);
        dom.loginAdminToken.value = "";
        dom.loginApiBase.value = state.apiBase;
        dom.appShell.hidden = true;
        dom.loginView.hidden = false;
        render();
        showLoginNotice(message || "登录已失效，请重新登录", "error");
      }

      function setBusy(value) {
        state.busy = value;
        dom.refreshAll.disabled = value;
        dom.applyConnection.disabled = value;
        dom.saveChannel.disabled = value;
        dom.runChannelTest.disabled = value;
      }

      function setLoginBusy(value) {
        dom.loginButton.disabled = value;
      }

      function showNotice(message, type) {
        dom.notice.textContent = message;
        dom.notice.className = `notice show ${type || ""}`.trim();
        if (type === "success") {
          window.clearTimeout(showNotice.timer);
          showNotice.timer = window.setTimeout(() => dom.notice.classList.remove("show"), 2400);
        }
      }

      function showLoginNotice(message, type) {
        dom.loginNotice.textContent = message;
        dom.loginNotice.className = `login-notice show ${type || ""}`.trim();
      }

      function render() {
        setView(state.activeView);
        const metrics = buildMetrics();
        dom.navOverviewCount.textContent = state.health?.status || "-";
        dom.navChannelCount.textContent = metrics.totalChannels;
        dom.navModelCount.textContent = state.models.length;
        dom.navStateCount.textContent = state.config?.version || "-";
        renderSummary(metrics);
        renderOverviewRows();
        renderFilters(metrics);
        renderChannels();
        renderModels();
        renderState();
      }

      function buildMetrics() {
        const channels = state.channels;
        const totalChannels = state.config?.channel_count ?? state.health?.channel_count ?? channels.length;
        const enabledChannels = state.config?.enabled_channel_count ?? state.health?.enabled_channel_count ?? channels.filter((item) => item.enabled).length;
        const total24h = sum(channels, "total_24h");
        const success24h = sum(channels, "success_24h");
        const failure24h = sum(channels, "failure_24h");
        const successRate = total24h ? Math.round((success24h / total24h) * 1000) / 10 : 0;
        const cooldown = channels.filter(isCoolingDown).length;
        const disabled = channels.filter((item) => !item.enabled).length;
        const keyed = channels.filter((item) => item.has_upstream_api_key).length;
        const missingUpstreamKey = channels.filter((item) => item.enabled && !item.has_upstream_api_key).length;
        return { totalChannels, enabledChannels, total24h, success24h, failure24h, successRate, cooldown, disabled, keyed, missingUpstreamKey };
      }

      function sum(items, key) {
        return items.reduce((total, item) => total + Number(item[key] || 0), 0);
      }

      function renderSummary(metrics) {
        const healthText = state.health?.status || "unknown";
        dom.summaryGrid.innerHTML = [
          metricHtml("服务状态", healthText, `数据库：${state.config?.database_path || "-"}`),
          metricHtml("渠道", String(metrics.enabledChannels), `总数 ${metrics.totalChannels}，禁用 ${metrics.disabled}`),
          metricHtml("24h 成功率", `${metrics.successRate}%`, `${metrics.success24h} 成功 / ${metrics.failure24h} 失败`),
          metricHtml("冷却中", String(metrics.cooldown), `连续失败阈值 ${state.config?.failure_threshold ?? "-"}`)
        ].join("");
      }

      function metricHtml(label, value, note) {
        return `<div class="metric"><div class="metric-label">${escapeHtml(label)}</div><div class="metric-value">${escapeHtml(value)}</div><div class="metric-note">${escapeHtml(note)}</div></div>`;
      }

      function renderOverviewRows() {
        if (!state.authenticated) {
          dom.overviewRows.innerHTML = `<tr><td colspan="7" class="empty">需要 Admin Token</td></tr>`;
          return;
        }
        if (!state.channels.length) {
          dom.overviewRows.innerHTML = `<tr><td colspan="7" class="empty">暂无渠道</td></tr>`;
          return;
        }
        dom.overviewRows.innerHTML = state.channels.slice(0, 8).map((channel) => `
          <tr>
            <td><strong>${escapeHtml(channel.name)}</strong></td>
            <td>${statusHtml(channel)}</td>
            <td>${escapeHtml(channel.priority)}</td>
            <td>${escapeHtml(channel.success_24h ?? 0)}</td>
            <td>${escapeHtml(channel.failure_24h ?? 0)}</td>
            <td>${escapeHtml(channel.consecutive_failures ?? 0)}</td>
            <td>${escapeHtml(formatDate(channel.cooldown_until))}</td>
          </tr>
        `).join("");
      }

      function renderFilters(metrics) {
        const filters = [
          ["all", "全部", state.channels.length],
          ["enabled", "启用", state.channels.filter((item) => item.enabled).length],
          ["disabled", "禁用", metrics.disabled],
          ["cooldown", "冷却", metrics.cooldown],
          ["keyed", "有上游 Key", metrics.keyed]
        ];
        dom.channelFilters.innerHTML = filters.map(([key, label, count]) => `
          <button type="button" class="chip ${state.filter === key ? "active" : ""}" data-filter="${key}">
            <span>${label}</span><span class="chip-count">${count}</span>
          </button>
        `).join("");
      }

      function renderChannels() {
        const metrics = buildMetrics();
        renderFilters(metrics);
        renderChannelKeyAlert(metrics);

        if (!state.authenticated) {
          dom.channelRows.innerHTML = `<tr><td colspan="11" class="empty">需要 Admin Token</td></tr>`;
          return;
        }

        const rows = state.channels.filter((channel) => {
          const queryMatch = !state.query || `${channel.name} ${channel.upstream_url}`.toLowerCase().includes(state.query);
          if (!queryMatch) return false;
          if (state.filter === "enabled") return channel.enabled;
          if (state.filter === "disabled") return !channel.enabled;
          if (state.filter === "cooldown") return isCoolingDown(channel);
          if (state.filter === "keyed") return channel.has_upstream_api_key;
          return true;
        });

        if (!rows.length) {
          dom.channelRows.innerHTML = `<tr><td colspan="11" class="empty">没有匹配渠道</td></tr>`;
          return;
        }

        dom.channelRows.innerHTML = rows.map((channel) => {
          const id = escapeHtml(channel.id);
          const rate = Number(channel.success_rate_24h || 0);
          const modelsHtml = channel.supported_models
            ? channel.supported_models.map((m) => `<span class="badge idle">${escapeHtml(m)}</span>`).join(" ")
            : badge("全部", "ok");
          return `
            <tr>
              <td><strong>${escapeHtml(channel.name)}</strong><div class="muted mono compact-id" title="${id}">${id}</div></td>
              <td><div class="truncate" title="${escapeHtml(channel.upstream_url)}">${escapeHtml(channel.upstream_url)}</div></td>
              <td><button type="button" class="toggle ${channel.enabled ? "on" : ""}" data-action="toggle-channel" data-id="${id}" aria-label="${channel.enabled ? "禁用" : "启用"}"></button></td>
              <td>${escapeHtml(channel.priority)}</td>
              <td>${channel.has_upstream_api_key ? badge("已保存", "info") : `${badge("缺失", "bad")}<div class="muted">不可调用</div>`}</td>
              <td>${channel.has_downstream_api_key ? badge("专属", "info") : badge("全局", "idle")}</td>
              <td>${modelsHtml}</td>
              <td>${badge(`${rate}%`, rate >= 95 ? "ok" : rate > 0 ? "warn" : "idle")}</td>
              <td>${escapeHtml(channel.consecutive_failures ?? 0)}</td>
              <td>${escapeHtml(formatDate(channel.updated_at))}</td>
              <td>
                <div class="row-actions">
                  <button type="button" data-action="test-channel" data-id="${id}" title="测试渠道" ${channel.has_upstream_api_key ? "" : "disabled"}>测试</button>
                  <button type="button" data-action="edit-channel" data-id="${id}" title="编辑">编辑</button>
                  <button type="button" data-action="reset-runtime" data-id="${id}" title="重置运行状态">重置</button>
                  <button type="button" data-action="delete-channel" data-id="${id}" class="danger" title="删除">删除</button>
                </div>
              </td>
            </tr>
          `;
        }).join("");
      }

      function renderChannelKeyAlert(metrics) {
        if (!state.authenticated || metrics.missingUpstreamKey === 0) {
          dom.channelKeyAlert.classList.remove("show");
          dom.channelKeyAlert.textContent = "";
          return;
        }
        dom.channelKeyAlert.textContent = `${metrics.missingUpstreamKey} 个启用渠道缺少上游 API Key。缺少上游 Key 的渠道不会参与实际调用，请编辑渠道补充。`;
        dom.channelKeyAlert.classList.add("show");
      }

      function renderModels() {
        if (!state.models.length) {
          dom.modelGrid.innerHTML = `<div class="empty">暂无模型</div>`;
          return;
        }
        dom.modelGrid.innerHTML = state.models.map((model) => `
          <article class="model-card">
            <div class="model-id mono">${escapeHtml(model.id)}</div>
            <div class="model-meta">${escapeHtml(model.owned_by || "-")} · ${escapeHtml(model.object || "model")}</div>
          </article>
        `).join("");
      }

      function renderState() {
        const config = state.config || {};
        const gatewayState = config.state || {};
        const details = [
          ["Originator", config.originator],
          ["Version", config.version],
          ["User-Agent", config.user_agent],
          ["Authorization", config.authorization],
          ["Failure Threshold", config.failure_threshold],
          ["Cooldown Seconds", config.cooldown_seconds],
          ["Database Path", config.database_path],
          ["Admin Token Source", config.admin_token_source],
          ["Client API Key Source", config.client_api_key_source],
          ["Installation ID", gatewayState.installation_id],
          ["Session ID", gatewayState.session_id],
          ["Thread ID", gatewayState.thread_id],
          ["Window ID", gatewayState.window_id],
          ["Window Generation", gatewayState.window_generation],
          ["Created At", gatewayState.created_at]
        ];
        dom.stateDetails.innerHTML = details.map(([label, value]) => `
          <div class="detail-item">
            <div class="detail-label">${escapeHtml(label)}</div>
            <div class="detail-value mono">${escapeHtml(value ?? "-")}</div>
          </div>
        `).join("");
      }

      async function handleAction(action, id) {
        if (action === "close-dialog") {
          dom.channelDialog.close();
          return;
        }
        if (action === "close-test-dialog") {
          dom.testDialog.close();
          return;
        }
        if (state.busy) return;
        const useBusyLock = busyActions.has(action);
        try {
          if (useBusyLock) setBusy(true);
          if (action === "new-channel") openChannelDialog();
          if (action === "edit-channel") openChannelDialog(findChannel(id));
          if (action === "test-channel") openTestDialog(findChannel(id));
          if (action === "toggle-channel") await toggleChannel(id);
          if (action === "reset-runtime") await resetRuntime(id);
          if (action === "delete-channel") await deleteChannel(id);
          if (action === "reset-fingerprint") await resetFingerprint();
          if (action === "refresh-models") await refreshModels();
        } catch (error) {
          showNotice(error.message, "error");
        } finally {
          if (useBusyLock) setBusy(false);
        }
      }

      function openChannelDialog(channel = null) {
        state.editingId = channel?.id || null;
        dom.dialogTitle.textContent = channel ? "编辑渠道" : "添加渠道";
        dom.channelName.value = channel?.name || "";
        dom.channelUrl.value = channel?.upstream_url || "";
        dom.channelPriority.value = channel?.priority ?? 0;
        dom.channelEnabled.value = channel?.enabled === false ? "false" : "true";
        dom.channelUpstreamKey.value = "";
        dom.channelDownstreamKey.value = "";
        dom.channelProxyUrl.value = channel?.proxy_url || "";
        dom.clearChannelUpstreamKey.checked = false;
        dom.clearChannelKey.checked = false;
        dom.clearUpstreamKeyWrap.style.display = channel ? "flex" : "none";
        dom.clearKeyWrap.style.display = channel ? "flex" : "none";
        const allModels = state.models.map((m) => m.id).filter(Boolean);
        if (!allModels.length) allModels.push("gpt-5.5", "gpt-5.4", "gpt-5.3-codex");
        const selected = channel?.supported_models;
        dom.channelModelChecks.innerHTML = allModels.map((id) => {
          const checked = !selected || selected.includes(id) ? "checked" : "";
          return `<label><input type="checkbox" value="${escapeHtml(id)}" ${checked}> ${escapeHtml(id)}</label>`;
        }).join("");
        dom.channelDialog.showModal();
        dom.channelName.focus();
      }

      function openTestDialog(channel) {
        state.testingId = channel.id;
        state.testResult = null;
        dom.testDialogTitle.textContent = `测试渠道：${channel.name}`;
        dom.testChannelName.value = `${channel.name} (${channel.id})`;
        renderModelOptions(channel.supported_models);
        renderTestResult();
        dom.testDialog.showModal();
        dom.testModel.focus();
      }

      function renderModelOptions(supportedModels) {
        const modelIds = state.models.map((model) => model.id).filter(Boolean);
        if (!modelIds.includes("gpt-5.5")) modelIds.unshift("gpt-5.5");
        const filtered = supportedModels ? modelIds.filter((id) => supportedModels.includes(id)) : modelIds;
        dom.testModel.innerHTML = filtered.map((id) => `<option value="${escapeHtml(id)}">${escapeHtml(id)}</option>`).join("");
        if (filtered.length) dom.testModel.value = filtered[0];
      }

      async function runChannelTest(event) {
        event.preventDefault();
        if (!state.testingId || state.busy) return;
        setBusy(true);
        state.testResult = { pending: true, message: "正在测试，最多等待 60 秒" };
        renderTestResult();
        try {
          const result = await request(`/admin/channels/${encodeURIComponent(state.testingId)}/test`, {
            method: "POST",
            admin: true,
            timeoutMs: 70000,
            body: { model: dom.testModel.value || "gpt-5.4" }
          });
          state.testResult = result;
          renderTestResult();
        } catch (error) {
          state.testResult = { success: false, message: error.message, latency_ms: 0, status_code: null, model: dom.testModel.value || "gpt-5.4" };
          renderTestResult();
        } finally {
          setBusy(false);
        }
      }

      function renderTestResult() {
        const result = state.testResult;
        if (!result) {
          dom.testResult.className = "test-result";
          dom.testResult.innerHTML = "";
          return;
        }
        if (result.pending) {
          dom.testResult.className = "test-result show";
          dom.testResult.innerHTML = `<div class="test-result-title">${escapeHtml(result.message)}</div>`;
          return;
        }
        const success = Boolean(result.success);
        dom.testResult.className = `test-result show ${success ? "success" : "error"}`;
        dom.testResult.innerHTML = `
          <div class="test-result-title">${success ? "测试成功" : "测试失败"}</div>
          <div class="test-result-grid">
            <div><span class="muted">模型</span><br><span class="mono">${escapeHtml(result.model || dom.testModel.value || "gpt-5.4")}</span></div>
            <div><span class="muted">耗时</span><br><span class="mono">${escapeHtml(result.latency_ms ?? 0)} ms</span></div>
            <div><span class="muted">HTTP 状态</span><br><span class="mono">${escapeHtml(result.status_code ?? "-")}</span></div>
            <div class="test-result-message"><span class="muted">结果</span><br>${escapeHtml(result.message || "-")}</div>
          </div>
        `;
      }

      async function saveChannel(event) {
        event.preventDefault();
        if (state.busy) return;
        const body = {
          name: dom.channelName.value.trim(),
          upstream_url: dom.channelUrl.value.trim(),
          priority: Number(dom.channelPriority.value || 0),
          enabled: dom.channelEnabled.value === "true"
        };
        if (!body.upstream_url.startsWith("http://") && !body.upstream_url.startsWith("https://")) {
          showNotice("上游地址必须以 http:// 或 https:// 开头", "error");
          return;
        }
        const checkedModels = [...dom.channelModelChecks.querySelectorAll("input:checked")].map((el) => el.value);
        if (!checkedModels.length) {
          showNotice("至少选择一个模型", "error");
          return;
        }
        body.supported_models = checkedModels;

        const proxyValue = dom.channelProxyUrl.value.trim();
        if (proxyValue && !proxyValue.startsWith("http://") && !proxyValue.startsWith("https://")) {
          showNotice("HTTP 代理地址必须以 http:// 或 https:// 开头", "error");
          return;
        }
        body.proxy_url = proxyValue || null;

        const upstreamKeyValue = dom.channelUpstreamKey.value.trim();
        const downstreamKeyValue = dom.channelDownstreamKey.value.trim();
        setBusy(true);
        try {
          if (state.editingId) {
            if (dom.clearChannelUpstreamKey.checked) body.upstream_api_key = null;
            if (upstreamKeyValue) body.upstream_api_key = upstreamKeyValue;
            if (dom.clearChannelKey.checked) body.downstream_api_key = null;
            if (downstreamKeyValue) body.downstream_api_key = downstreamKeyValue;
            await request(`/admin/channels/${encodeURIComponent(state.editingId)}`, { method: "PATCH", admin: true, body });
          } else {
            body.upstream_api_key = upstreamKeyValue || null;
            body.downstream_api_key = downstreamKeyValue || null;
            await request("/admin/channels", { method: "POST", admin: true, body });
          }
          dom.channelDialog.close();
          await loadChannels();
          render();
          showNotice("渠道已保存", "success");
        } catch (error) {
          showNotice(error.message, "error");
        } finally {
          setBusy(false);
        }
      }

      async function toggleChannel(id) {
        const channel = findChannel(id);
        const action = channel.enabled ? "disable" : "enable";
        await request(`/admin/channels/${encodeURIComponent(id)}/${action}`, { method: "POST", admin: true });
        await loadChannels();
        render();
        showNotice(channel.enabled ? "渠道已禁用" : "渠道已启用", "success");
      }

      async function resetRuntime(id) {
        const channel = findChannel(id);
        if (!window.confirm(`重置渠道「${channel.name}」的运行状态？`)) return;
        await request(`/admin/channels/${encodeURIComponent(id)}/reset-runtime`, { method: "POST", admin: true });
        await loadChannels();
        render();
        showNotice("运行状态已重置", "success");
      }

      async function deleteChannel(id) {
        const channel = findChannel(id);
        if (!window.confirm(`删除渠道「${channel.name}」？`)) return;
        await request(`/admin/channels/${encodeURIComponent(id)}`, { method: "DELETE", admin: true });
        await loadChannels();
        render();
        showNotice("渠道已删除", "success");
      }

      async function resetFingerprint() {
        if (!window.confirm("重置网关指纹？")) return;
        await request("/admin/fingerprint/reset", { method: "POST", admin: true });
        state.config = await request("/admin/config", { admin: true });
        render();
        showNotice("指纹已重置", "success");
      }

      async function refreshModels() {
        const data = await request("/v1/models");
        state.models = Array.isArray(data.data) ? data.data : [];
        render();
        showNotice("模型已刷新", "success");
      }

      function findChannel(id) {
        const channel = state.channels.find((item) => item.id === id);
        if (!channel) throw new Error("渠道不存在");
        return channel;
      }

      function statusHtml(channel) {
        if (!channel.enabled) return badge("禁用", "idle");
        if (isCoolingDown(channel)) return badge("冷却", "warn");
        if (Number(channel.consecutive_failures || 0) > 0) return badge("异常", "warn");
        return badge("正常", "ok");
      }

      function badge(text, type) {
        return `<span class="status-pill ${type}">${escapeHtml(text)}</span>`;
      }

      function isCoolingDown(channel) {
        if (!channel.cooldown_until) return false;
        const time = new Date(channel.cooldown_until).getTime();
        return Number.isFinite(time) && time > Date.now();
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (!Number.isFinite(date.getTime())) return value;
        return new Intl.DateTimeFormat("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[char]);
      }
    })();
  </script>
</body>
</html>
